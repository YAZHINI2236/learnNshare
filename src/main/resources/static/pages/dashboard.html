<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LearnNShare Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef5f3;
    min-height:100vh;
    overflow-x:hidden;
}

/* Background Shapes */

body::before{
    content:'';
    position:fixed;
    width:700px;
    height:700px;
    border-radius:50%;
    background:rgba(29,111,107,0.08);
    top:-250px;
    left:-250px;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    background:rgba(29,111,107,0.05);
    bottom:-250px;
    right:-250px;
    z-index:-1;
}

/* Navbar */

.navbar{
    width:90%;
    max-width:1300px;
    margin:auto;
    padding:30px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #d9e4e0;
}

.logo{
    font-size:3.5rem;
    color:#1d6f6b;
    font-weight:300;
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:#1f2d2c;
    font-size:18px;
    transition:.3s;
}

.nav-links a:hover{
    color:#1d6f6b;
}

/* Hero */

.hero{
    width:90%;
    max-width:1300px;
    margin:auto;
    min-height:80vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:60px;
}

.hero-text h1{
    font-size:6rem;
    line-height:1;
    font-weight:300;
    color:#122b29;
}

.hero-text .green{
    color:#1d6f6b;
    display:block;
}

.hero-text p{
    font-size:1.5rem;
    margin:25px 0;
    color:#4f5f5c;
}

.upload-btn{
    border:none;
    background:#1d6f6b;
    color:white;
    padding:16px 40px;
    border-radius:40px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.upload-btn:hover{
    background:#155854;
}

/* Image */

.hero-image{
    position:relative;
}

.hero-image::before{
    content:'';
    position:absolute;
    width:95%;
    height:100%;
    background:#1d6f6b;
    top:25px;
    right:-25px;
    border-radius:6px;
}

.hero-image img{
    width:100%;
    border-radius:6px;
    position:relative;
    z-index:2;
    display:block;
}

/* Responsive */

@media(max-width:992px){

.navbar{
    flex-direction:column;
    gap:20px;
}

.nav-links{
    flex-wrap:wrap;
    justify-content:center;
}

.hero{
    grid-template-columns:1fr;
    text-align:center;
}

.hero-text h1{
    font-size:4rem;
}

}

</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">
        LearnNShare
    </div>

    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#" onclick="goToUpload()">Upload</a>
        <a href="#" onclick="goToResources()">Resources</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

</nav>

<section class="hero">

    <div class="hero-text">

        <h1>
            Share Your
            <span class="green">Knowledge</span>
        </h1>

        <p id="welcomeText">
            Welcome Back
        </p>

        <button class="upload-btn"
                onclick="goToUpload()">
            Upload Notes
        </button>

    </div>

    <div class="hero-image">

        <img src="/images/study.png"
             alt="LearnNShare">

    </div>

</section>

<script src="/js/dashboard.js"></script>

</body>
</html>
